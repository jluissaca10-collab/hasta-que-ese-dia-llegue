<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hasta que ese día llegue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- PANTALLA DE BIENVENIDA -->
  <section id="welcome" class="screen welcome active">
    <div class="welcome-inner">
      <span class="welcome-kicker">Para ti</span>
      <h1 class="welcome-title">Hasta que ese día llegue <span class="heart">❤</span></h1>
      <p class="welcome-sub">Una cuenta hacia nuestro día. Cada jornada esconde un sobre.</p>
      <button id="enterBtn" class="btn-primary">Entrar</button>
    </div>
    <div class="welcome-glow"></div>
  </section>

  <!-- PANTALLA PRINCIPAL -->
  <section id="main" class="screen main">
    <header class="main-header">
      <h2 class="main-title">Hasta que ese día llegue <span class="heart">❤</span></h2>
      <div class="countdown" id="countdown">
        <div class="cd-block"><span id="cd-days">00</span><label>días</label></div>
        <div class="cd-block"><span id="cd-hours">00</span><label>horas</label></div>
        <div class="cd-block"><span id="cd-mins">00</span><label>min</label></div>
        <div class="cd-block"><span id="cd-secs">00</span><label>seg</label></div>
      </div>
      <p class="countdown-label" id="countdown-label">Faltan para el día 0</p>
    </header>

    <div class="envelopes" id="envelopes"><!-- generado por JS --></div>

    <footer class="main-footer">Con cariño · Hasta que ese día llegue</footer>
  </section>

  <!-- MODAL CONTRASEÑA -->
  <div id="passModal" class="modal">
    <div class="modal-card">
      <button class="modal-close" data-close="passModal">×</button>
      <span class="modal-icon">✦</span>
      <h3 id="passTitle">Día</h3>
      <p class="modal-text">Escribe la contraseña para abrir este sobre.</p>
      <input type="password" id="passInput" class="pass-input" inputmode="text" autocomplete="off" placeholder="Contraseña" />
      <p id="passError" class="pass-error"></p>
      <button id="passSubmit" class="btn-primary">Abrir</button>
    </div>
  </div>

  <!-- MODAL CONTENIDO -->
  <div id="contentModal" class="modal">
    <div class="modal-card content-card">
      <button class="modal-close" data-close="contentModal">×</button>
      <div id="contentBody" class="content-body"></div>
      <div id="introControls" class="intro-controls">
        <span id="introCounter" class="intro-counter">1 / 3</span>
        <button id="introNext" class="btn-primary">Siguiente</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
